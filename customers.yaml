# customers.yaml — cadastro de redes de clientes (network CIDR -> customer_prefix/nome).
# src_ip do flow é resolvido pro customer_prefix se cair dentro de alguma 'network' aqui
# (aceita /32 pra host único ou qualquer CIDR). Se já existir cadastro em outro sistema
# (RADIUS, ERP), preferir reusar aquele; este arquivo é o fallback.
# Editável diretamente ou via: clientguard-cli customers add|del <network> <prefix>
#
# client_multiplier: quantas identidades reais um único src_ip visível desse prefixo pode
# representar combinadas (ex.: pool de CGNAT, onde 1 IP externo = várias pessoas atrás do
# NAT). detector.py escala os limiares de volume/diversidade por esse fator pra não confundir
# tráfego combinado de várias pessoas com o comportamento de 1 cliente só. Sem o campo (ou
# valor 1), nenhum ajuste é aplicado.
- network: 177.86.16.0/24
  prefix: 177.86.16.0/24
- network: 177.86.17.0/24
  prefix: 177.86.17.0/24
- network: 177.86.18.0/24
  prefix: 177.86.18.0/24
- network: 177.86.19.0/24
  prefix: 177.86.19.0/24
- network: 177.86.20.0/24
  prefix: 177.86.20.0/24
  name: CGNAT-B20
