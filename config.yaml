# ClientGuard — config própria, independente do FlowGuard.

daemon:
  socket: /var/run/clientguard.sock   # socket de controle consumido pelo clientguard-cli

# Socket do daemon FlowGuard — usado pra (1) consultar status da sessão BGP
# (Up/Down) e (2) bloqueio manual de cliente abusivo, que é só uma regra
# FlowSpec (discard por src_prefix) pedida pro FlowGuard anunciar — só ele fala
# BGP com o roteador (uma sessão só), o ClientGuard nunca guarda essa regra
# localmente nem tem TTL próprio pra ela.
flowguard_socket: /var/run/flowguard.sock

capture:
  # `ip route get 10.77.10.2` mostra "dev lo" porque é a rota de SAÍDA pra um IP
  # local — isso não tem relação com a interface de CHEGADA de tráfego externo.
  # O NetFlow chega de verdade fisicamente em ens18 (confirmado com tcpdump: os
  # pacotes vêm de fora, ex. 177.86.16.1:40000 -> 10.77.10.2:2055); sniffar "lo"
  # nunca via esse tráfego. O socket do FlowGuard não sofre com isso porque ele
  # recebe via bind de socket (não depende de interface), só a captura passiva
  # do ClientGuard (scapy.sniff) é sensível a isso.
  iface: ens18
  # 2055: NE8000BGP (mesmo feed do FlowGuard) — DESLIGADO 2026-07-03 a pedido do
  # usuário: ClientGuard passou a escutar só a caixa PPPOE, não mais as 2 caixas
  # (BGP + PPPOE) ao mesmo tempo.
  # 2056: NetFlow do A10 (CGNAT) — PAUSADO 2026-07-03 a pedido do usuário: sem
  # sampling configurado no equipamento, o volume (~157k flows/25s) estourava a
  # fila interna do daemon (200k, drenada 1x por ciclo de 30s), descartando
  # dezenas de milhares de flows/min.
  # 2060: NetFlow do NE8000-PPPOE (Huawei), peer 177.86.23.225 (confirmado via
  # tcpdump 2026-07-03, IP de export — diferente do IP de gerência SSH usado no
  # warmode.yaml). Único feed ativo agora. Volume bem menor que o A10 (~155
  # flows/s vs ~6300/s), sem risco de estourar a fila interna. Mistura tráfego
  # de clientes CGNAT (src_ip em 100.64.0.0/16, pré-NAT — 42% dos registros numa
  # amostra) e de clientes com IP público direto (177.86.16.0/24 etc, já
  # cadastrados em customers.yaml) — faz sentido, é o agregador de sessões
  # PPPoE, não só CGNAT.
  bpf_filter: "udp port 2060"
  # fallback pra peer sem entrada em sampling_rate_by_peer — não usado agora que
  # o único feed ativo (177.86.23.225) já tem override abaixo, mantido caso um
  # novo peer seja adicionado sem calibrar o sampling primeiro.
  sampling_rate: 1000
  # sampling_rate_by_peer: sobrescreve sampling_rate acima por IP de origem do
  # export (peer) — necessário quando o exportador não preenche o campo
  # SAMPLING_INTERVAL (34) do NetFlow e a taxa real difere do valor global.
  # 177.86.23.225 (NE8000-PPPOE) não preenche esse campo (confirmado via
  # captura real) — assumindo 1:1 (sem amostragem), mesma lógica aplicada ao
  # A10 (log completo de sessão, não telemetria amostrada). CONFIRMAR com o
  # equipamento se isso mudar.
  sampling_rate_by_peer:
    "177.86.23.225": 1

database:
  path: /root/clientguard/db/client_flow.sqlite
  retention_days: 7
  aggregate_interval_s: 30

flowguard_reuse:
  # Import somente-leitura do parser de NetFlow do FlowGuard (collector/netflow.py) —
  # nenhum arquivo dentro desse caminho é modificado pelo ClientGuard.
  path: /root/flowguard

customer_registry: /root/clientguard/customers.yaml
whitelist_file: /root/clientguard/whitelist.yaml
# liga/desliga cada detector e a explicação por IA, editável via portal (aba
# ClientGuard > Configurações) ou `clientguard-cli toggles set` — chave ausente
# ou arquivo inexistente = habilitado (não muda comportamento pra quem não usar isso)
feature_toggles_file: /root/clientguard/toggles.yaml

# mitigação direta na borda (SSH/ACL no roteador) por src_ip — legado, mantido só
# pra reverter mitigações SSH já ativas de antes da migração pra FlowSpec (ver
# flowspec_mitigation_file abaixo). Nenhum gatilho automático NOVO usa este caminho.
edge_mitigation_file: /root/clientguard/edge_mitigation.yaml

# mitigação via BGP FlowSpec (proxy pro FlowGuard, sem SSH) — substitui
# edge_mitigation_file como caminho de auto-mitigação. Ver flowspec_mitigation.yaml
# (ação por detector: discard/rate_limit/off, orçamento de regras, piso de rate-limit).
flowspec_mitigation_file: /root/clientguard/flowspec_mitigation.yaml

# baseline EWMA por cliente (tráfego de DNS e de portas de amplificação), usada só
# pra calcular o rate-limit DINÂMICO do FlowSpec — não afeta os limiares de detecção
# em si (esses continuam em detection: acima). window_minutes/min_samples no mesmo
# espírito do baseline do FlowGuard (prefix_baseline); stale_days poda cliente que
# sumiu/trocou de IP.
dns_baseline:
  window_minutes: 180
  min_samples: 120
  stale_days: 14

detection:
  scan_horizontal_hosts: 30      # N destinos distintos, mesma porta, pra contar como scan horizontal
  scan_vertical_ports: 30        # N portas distintas, mesmo destino, pra contar como scan vertical
  # tráfego P2P/torrent também bate muitos hosts/portas distintos, mas com volume real de
  # dados por destino — scan de reconhecimento de verdade manda pacotes pequenos de sonda
  # (às vezes só um SYN). 10000 (10 KB) de média por destino/porta separa os dois casos;
  # acima disso é transferência de dados de verdade, não sonda.
  scan_max_avg_bytes: 10000
  amplifier_ports: [53, 123, 1900, 11211, 389]
  amplifier_min_bps: 5000000
  spam_ports: [25, 465, 587]
  spam_min_distinct_dest: 20
  coordinated_min_clients: 8        # N clientes distintos no mesmo dst_ip:dst_port pra contar como coordenado
  # portas de serviço compartilhado por natureza — QUALQUER app popular concentra muitos
  # clientes na mesma porta desses serviços ao mesmo tempo, então isso não é indício de
  # coordenação/scan. Usado tanto por scan_horizontal (que olha "muitos hosts, mesma
  # porta") quanto por coordinated_destination (que olha "muitos clientes, mesmo
  # destino"). Descoberto empiricamente: 853=DoT (ex. AdGuard/Cloudflare DNS), 3478=
  # STUN/TURN (WebRTC — chamada de voz/vídeo), 5222/5223=XMPP/APNs (WhatsApp/Messenger,
  # Apple Push), 5228=Firebase Cloud Messaging (push do Android) — sem isso, os dois
  # detectores flagravam a maioria dos clientes ativos só por navegarem/usarem apps
  # normalmente (visto em produção: ~1250 sinais abertos de ~1300, quase todo falso
  # positivo, antes desse ajuste). 4500=IPsec NAT-T (VPN) — mesmo padrão, vários clientes
  # no mesmo concentrador de VPN corporativa/comercial.
  common_service_ports: [53, 80, 123, 443, 853, 3478, 4500, 5222, 5223, 5228]
  # pacotes DNS (udp/53) pro mesmo resolver na janela, JÁ multiplicado pelo sampling_rate
  # (real_packets = packets * sampling_rate, igual usado em amplifier_min_bps) — com
  # sampling_rate=1000, isso equivale a exigir ~20 pacotes amostrados na origem pra esse
  # fluxo específico, bem acima do que navegação normal costuma gerar por resolver.
  dns_tunneling_min_queries: 20000
  window_s: 30
  min_duration_s: 10
  # rede de segurança: resolve sozinho um sinal sem atualização (ts_last_seen) há
  # mais desse tempo (ver storage.py::resolve_stale_signals) — os detectores só
  # tocam um sinal quando a condição bate de novo, então sem isso um sinal cujo
  # cliente parou de fato (scan/spam/etc encerrado) ficava "aberto" pra sempre até
  # clique manual em "Resolver", mesmo com a mitigação associada já expirada.
  signal_stale_resolve_s: 21600

alerts:
  webhook_url: ""
  whatsapp: true
  min_confidence_wa: 0.8   # só avisa sinais com confiança alta o suficiente pra não virar spam

ai:
  enabled: true
  env_file: /root/ai/.env   # mesmo .env do FlowGuard, ANTHROPIC_API_KEY (fora do repo/git)
  model: claude-haiku-4-5-20251001
  min_confidence: 0.0        # explica qualquer sinal novo; suba pra só explicar os mais confiáveis
  rate_limit_rpm: 5

threat_feed:
  # Implementação própria do ClientGuard (o FlowGuard só tem essa seção no config.yaml
  # dele, nunca implementou o download). Mescla feeds públicos de reputação num cache
  # local, refeito a cada update_interval_h; detect_malicious_contact usa esse cache.
  enabled: false
  cache_file: /root/clientguard/db/threat_ips.txt
  update_interval_h: 6
  sources:
    - https://feodotracker.abuse.ch/downloads/ipblocklist.txt
    - https://www.spamhaus.org/drop/drop.txt
    - https://www.spamhaus.org/drop/edrop.txt
    - https://raw.githubusercontent.com/stamparm/ipsum/master/levels/3.txt
