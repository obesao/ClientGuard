# ClientGuard — config própria, independente do FlowGuard.

daemon:
  socket: /var/run/clientguard.sock   # socket de controle consumido pelo clientguard-cli

# Só pra clientguard-cli consultar o status da sessão BGP (Up/Down) do FlowGuard —
# BGP é gerenciado 100% pelo FlowGuard/ExaBGP, isso é só leitura via socket, sem
# nenhum código ou config compartilhado além disso.
flowguard_socket: /var/run/flowguard.sock

capture:
  iface: lo   # tráfego pra 10.77.10.2:2055 é endereço local do próprio host — o kernel
              # roteia via loopback (confirmado com `ip route get 10.77.10.2`), nunca
              # aparece na interface física ens18. Sniffar em "lo" é o ponto certo.
  bpf_filter: "udp port 2055"   # mesmo tráfego que já chega pro FlowGuard, só observado
  sampling_rate: 1000            # mesmo valor do NE8000 usado pelo FlowGuard (collector.sampling_rate)

database:
  path: /root/clientguard/db/client_flow.sqlite
  retention_days: 7
  aggregate_interval_s: 30

flowguard_reuse:
  # Import somente-leitura do parser de NetFlow do FlowGuard (collector/netflow.py) —
  # nenhum arquivo dentro desse caminho é modificado pelo ClientGuard.
  path: /root/flowguard

customer_registry: /root/clientguard/customers.yaml
whitelist_file: /root/clientguard/whitelist.yaml

detection:
  scan_horizontal_hosts: 30      # N destinos distintos, mesma porta, pra contar como scan horizontal
  scan_vertical_ports: 30        # N portas distintas, mesmo destino, pra contar como scan vertical
  amplifier_ports: [53, 123, 1900, 11211, 389]
  amplifier_min_bps: 5000000
  spam_ports: [25, 465, 587]
  spam_min_distinct_dest: 20
  coordinated_min_clients: 3        # N clientes distintos no mesmo dst_ip:dst_port pra contar como coordenado
  coordinated_exclude_ports: [80, 443, 53]   # portas web/DNS comuns, exclui ruído óbvio de CDN/HTTPS/DNS
  # pacotes DNS (udp/53) pro mesmo resolver na janela, JÁ multiplicado pelo sampling_rate
  # (real_packets = packets * sampling_rate, igual usado em amplifier_min_bps) — com
  # sampling_rate=1000, isso equivale a exigir ~20 pacotes amostrados na origem pra esse
  # fluxo específico, bem acima do que navegação normal costuma gerar por resolver.
  dns_tunneling_min_queries: 20000
  window_s: 30
  min_duration_s: 10

alerts:
  webhook_url: ""

ai:
  enabled: true
  env_file: /root/ai/.env   # mesmo .env do FlowGuard, ANTHROPIC_API_KEY (fora do repo/git)
  model: claude-haiku-4-5-20251001
  min_confidence: 0.0        # explica qualquer sinal novo; suba pra só explicar os mais confiáveis
  rate_limit_rpm: 5

threat_feed:
  # Implementação própria do ClientGuard (o FlowGuard só tem essa seção no config.yaml
  # dele, nunca implementou o download). Mescla feeds públicos de reputação num cache
  # local, refeito a cada update_interval_h; detect_malicious_contact usa esse cache.
  enabled: true
  cache_file: /root/clientguard/db/threat_ips.txt
  update_interval_h: 6
  sources:
    - https://feodotracker.abuse.ch/downloads/ipblocklist.txt
    - https://www.spamhaus.org/drop/drop.txt
    - https://www.spamhaus.org/drop/edrop.txt
    - https://raw.githubusercontent.com/stamparm/ipsum/master/levels/3.txt
